version: 2
project_name: expedia-cars-pp-cli
changelog:
  disable: true
builds:
  - id: expedia-cars-pp-cli
    main: ./cmd/expedia-cars-pp-cli
    binary: expedia-cars-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X expedia-cars-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: expedia-cars-pp-mcp
    main: ./cmd/expedia-cars-pp-mcp
    binary: expedia-cars-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: expedia-cars-pp-cli
    repository:
      owner: jeff-kittrell
      name: homebrew-tap
    homepage: "https://github.com/jeff-kittrell/expedia-cars-pp-cli"
    description: "Discovered API spec for browser-intake-us5-datadoghq"
    install: |
      bin.install "expedia-cars-pp-cli"
      bin.install "expedia-cars-pp-mcp"
